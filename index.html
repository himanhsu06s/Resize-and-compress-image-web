<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resize Image</title>
    <link rel="stylesheet" href="style.css" />
    <script src="Script.js" defer></script>
    </head>
    <body>
    <div class="wrapper">
        <div class="upload-box">
            <input type="file" hidden/>
            <img id="previewImg" onerror="handleError()" style="display: none;" />
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"
                fill="currentColor"
                class="bi bi-upload"
                viewBox="0 0 16 16">
                <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
            </svg>
            <label for="fileInput">Browse file to Upload</label>
        </div>
        <div class="content">
            <div class="row sizes">
                <div class="colum width">
                    <input type="text" onfocus="if(this.value=='width') this.value='';" onblur="if(this.value=='') this.value='width';" value="width" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>
                
                <div class="colum height">
                    <input type="text" onfocus="if(this.value=='height') this.value='';" onblur="if(this.value=='') this.value='height';" value="height" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>
            </div>
            <div class="row checkbox">
                <div class="colum ratio">
                    <input type="checkbox" id="ratio" />
                    <label for="ratio">Lock aspect-ratio</label>
                </div>
                <div class="colum quality">
                    <input type="checkbox" id="quality" />
                    <label for="quality">Reduce Quality</label>
                </div>
            </div>
                        <button class="download-button">Download Image</button>
                        
        </div>
    </div>
</body>
</html>
